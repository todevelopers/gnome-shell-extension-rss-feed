name: CI

on: [push, pull_request]

jobs:
  lint-js:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: npm install
      - name: Run ESLint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint.log
      - name: Run ESLint (JSON)
        if: always()
        continue-on-error: true
        run: npx eslint . --format json -o eslint.json || true
      - name: Compute stats
        id: stats
        if: always()
        env:
          LOG: eslint.log
          PATTERN: '✖ [0-9]+ problems \(([0-9]+) errors, ([0-9]+) warnings\)'
        run: |
          errors=0
          warnings=0
          if [[ $(cat "$LOG") =~ $PATTERN ]]; then
            errors="${BASH_REMATCH[1]}"
            warnings="${BASH_REMATCH[2]}"
          fi
          if [ "$errors" -gt 0 ]; then
            emoji="❌"; alert="CAUTION"; status_text="failed"; color="red"
            if [ "$warnings" -gt 0 ]; then
              message="$errors errors, $warnings warnings"
            else
              message="$errors errors"
            fi
          elif [ "$warnings" -gt 0 ]; then
            emoji="⚠️"; alert="WARNING"; status_text="passed with warnings"; color="yellow"
            message="$warnings warnings"
          else
            emoji="✅"; alert="NOTE"; status_text="passed"; color="brightgreen"
            message="passing"
          fi
          {
            echo "errors=$errors"
            echo "warnings=$warnings"
            echo "emoji=$emoji"
            echo "alert=$alert"
            echo "status_text=$status_text"
            echo "color=$color"
            echo "message=$message"
          } >> "$GITHUB_OUTPUT"
      - name: Write summary
        if: always()
        env:
          TOOL: ESLint
          LOG: eslint.log
          JSON: eslint.json
          EMOJI: ${{ steps.stats.outputs.emoji }}
          ALERT: ${{ steps.stats.outputs.alert }}
          STATUS: ${{ steps.stats.outputs.status_text }}
          ERRORS: ${{ steps.stats.outputs.errors }}
          WARNINGS: ${{ steps.stats.outputs.warnings }}
        run: |
          {
            echo "## $EMOJI $TOOL"
            echo ""
            echo "> [!$ALERT]"
            echo "> Status: $STATUS — $((ERRORS + WARNINGS)) findings ($ERRORS errors, $WARNINGS warnings)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          render_table() {
            local severity="$1" heading="$2"
            [ -s "$JSON" ] || return 0
            local rows
            rows=$(jq -r --arg s "$severity" '
              [.[] | .filePath as $f | .messages[]
                | select(.severity == ($s | tonumber))
                | "| \(.ruleId // "-") | \($f | split("/") | last):\(.line) | \(.message | gsub("\\|"; "\\\\|") | gsub("\n"; " ")) |"]
              | .[]' "$JSON" 2>/dev/null) || return 0
            if [ -n "$rows" ]; then
              local count
              count=$(echo "$rows" | wc -l)
              {
                echo "### $heading ($count)"
                echo ""
                echo "| Rule | Location | Message |"
                echo "|---|---|---|"
                echo "$rows"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          render_table 2 "❌ Errors" || true
          render_table 1 "⚠️ Warnings" || true

          {
            echo "<details><summary>Full output (click to expand)</summary>"
            echo ""
            echo '```text'
            cat "$LOG"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish badge
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 87195eb23e76eae80cd14a6d80e56072
          filename: eslint.json
          label: eslint
          message: ${{ steps.stats.outputs.message }}
          color: ${{ steps.stats.outputs.color }}
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-log
          path: eslint.log

  lint-gnome:
    name: shexli (GNOME static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install shexli
      - name: Run shexli
        run: |
          set -o pipefail
          shexli "$PWD" 2>&1 | tee shexli.log
      - name: Compute stats
        id: stats
        if: always()
        env:
          LOG: shexli.log
          PATTERN: 'issues_found \([0-9]+ findings, ([0-9]+) errors, ([0-9]+) warnings\)'
        run: |
          errors=0
          warnings=0
          if [[ $(cat "$LOG") =~ $PATTERN ]]; then
            errors="${BASH_REMATCH[1]}"
            warnings="${BASH_REMATCH[2]}"
          fi
          if [ "$errors" -gt 0 ]; then
            emoji="❌"; alert="CAUTION"; status_text="failed"; color="red"
            if [ "$warnings" -gt 0 ]; then
              message="$errors errors, $warnings warnings"
            else
              message="$errors errors"
            fi
          elif [ "$warnings" -gt 0 ]; then
            emoji="⚠️"; alert="WARNING"; status_text="passed with warnings"; color="yellow"
            message="$warnings warnings"
          else
            emoji="✅"; alert="NOTE"; status_text="passed"; color="brightgreen"
            message="passing"
          fi
          {
            echo "errors=$errors"
            echo "warnings=$warnings"
            echo "emoji=$emoji"
            echo "alert=$alert"
            echo "status_text=$status_text"
            echo "color=$color"
            echo "message=$message"
          } >> "$GITHUB_OUTPUT"
      - name: Parse findings
        if: always()
        continue-on-error: true
        run: |
          python3 <<'EOF' || true
          import re, json

          text = open('shexli.log').read()
          header = re.compile(r'^(EGO-[A-Z]-\d+)\s+(error|warning)\s*$', re.MULTILINE)
          matches = list(header.finditer(text))
          findings = []
          for i, m in enumerate(matches):
              start = m.end()
              end = matches[i+1].start() if i+1 < len(matches) else len(text)
              block = text[start:end]
              msg = next((l.strip() for l in block.splitlines() if l.strip()), '')
              locs = re.findall(r'-->\s+(\S+)', block) + re.findall(r'=\s*also:\s+(\S+)', block)
              short = [l.rsplit('/', 1)[-1] for l in locs]
              location = short[0] if short else '-'
              if len(short) > 1:
                  location += f' (+{len(short)-1} more)'
              findings.append({'code': m.group(1), 'severity': m.group(2), 'location': location, 'msg': msg})

          def write_table(path, items):
              if not items:
                  open(path, 'w').close()
                  return
              with open(path, 'w') as fp:
                  for f in items:
                      msg = f['msg'].replace('|', '\\|').replace('\n', ' ')
                      fp.write(f"| {f['code']} | {f['location']} | {msg} |\n")

          write_table('shexli-errors.tbl', [f for f in findings if f['severity'] == 'error'])
          write_table('shexli-warnings.tbl', [f for f in findings if f['severity'] == 'warning'])
          EOF
      - name: Write summary
        if: always()
        env:
          TOOL: shexli
          LOG: shexli.log
          EMOJI: ${{ steps.stats.outputs.emoji }}
          ALERT: ${{ steps.stats.outputs.alert }}
          STATUS: ${{ steps.stats.outputs.status_text }}
          ERRORS: ${{ steps.stats.outputs.errors }}
          WARNINGS: ${{ steps.stats.outputs.warnings }}
        run: |
          {
            echo "## $EMOJI $TOOL"
            echo ""
            echo "> [!$ALERT]"
            echo "> Status: $STATUS — $((ERRORS + WARNINGS)) findings ($ERRORS errors, $WARNINGS warnings)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          render_table() {
            local file="$1" heading="$2"
            [ -s "$file" ] || return 0
            local count
            count=$(wc -l < "$file")
            {
              echo "### $heading ($count)"
              echo ""
              echo "| Rule | Location | Message |"
              echo "|---|---|---|"
              cat "$file"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          }

          render_table shexli-errors.tbl "❌ Errors" || true
          render_table shexli-warnings.tbl "⚠️ Warnings" || true

          {
            echo "<details><summary>Full output (click to expand)</summary>"
            echo ""
            echo '```text'
            cat "$LOG"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish badge
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 87195eb23e76eae80cd14a6d80e56072
          filename: shexli.json
          label: shexli
          message: ${{ steps.stats.outputs.message }}
          color: ${{ steps.stats.outputs.color }}
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shexli-log
          path: shexli.log
