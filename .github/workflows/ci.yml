name: CI

on: [push, pull_request]

jobs:
  lint-js:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: npm install
      - name: Run ESLint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint.log
      - name: Write summary
        if: always()
        run: |
          echo "## ESLint" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat eslint.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-log
          path: eslint.log

  lint-gnome:
    name: shexli (GNOME static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install shexli
      - name: Run shexli
        run: |
          set -o pipefail
          shexli "$PWD" 2>&1 | tee shexli.log
      - name: Write summary
        if: always()
        run: |
          echo "## shexli" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat shexli.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shexli-log
          path: shexli.log
