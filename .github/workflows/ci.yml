name: CI

on: [push, pull_request]

jobs:
  lint-js:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: npm install
      - name: Run ESLint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint.log
      - name: Write summary
        if: always()
        env:
          TOOL: ESLint
          LOG: eslint.log
          PATTERN: '✖ [0-9]+ problems \(([0-9]+) errors, ([0-9]+) warnings\)'
        run: |
          errors=0
          warnings=0
          if [[ $(cat "$LOG") =~ $PATTERN ]]; then
            errors="${BASH_REMATCH[1]}"
            warnings="${BASH_REMATCH[2]}"
          fi
          if [ "$errors" -gt 0 ]; then
            emoji="❌"; alert="CAUTION"; status="failed"
          elif [ "$warnings" -gt 0 ]; then
            emoji="⚠️"; alert="WARNING"; status="passed with warnings"
          else
            emoji="✅"; alert="NOTE"; status="passed"
          fi
          {
            echo "## $emoji $TOOL"
            echo ""
            echo "> [!$alert]"
            echo "> Status: $status — $((errors + warnings)) findings ($errors errors, $warnings warnings)"
            echo ""
            echo "<details><summary>Full output (click to expand)</summary>"
            echo ""
            echo '```text'
            cat "$LOG"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-log
          path: eslint.log

  lint-gnome:
    name: shexli (GNOME static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install shexli
      - name: Run shexli
        run: |
          set -o pipefail
          shexli "$PWD" 2>&1 | tee shexli.log
      - name: Write summary
        if: always()
        env:
          TOOL: shexli
          LOG: shexli.log
          PATTERN: 'issues_found \([0-9]+ findings, ([0-9]+) errors, ([0-9]+) warnings\)'
        run: |
          errors=0
          warnings=0
          if [[ $(cat "$LOG") =~ $PATTERN ]]; then
            errors="${BASH_REMATCH[1]}"
            warnings="${BASH_REMATCH[2]}"
          fi
          if [ "$errors" -gt 0 ]; then
            emoji="❌"; alert="CAUTION"; status="failed"
          elif [ "$warnings" -gt 0 ]; then
            emoji="⚠️"; alert="WARNING"; status="passed with warnings"
          else
            emoji="✅"; alert="NOTE"; status="passed"
          fi
          {
            echo "## $emoji $TOOL"
            echo ""
            echo "> [!$alert]"
            echo "> Status: $status — $((errors + warnings)) findings ($errors errors, $warnings warnings)"
            echo ""
            echo "<details><summary>Full output (click to expand)</summary>"
            echo ""
            echo '```text'
            cat "$LOG"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shexli-log
          path: shexli.log
