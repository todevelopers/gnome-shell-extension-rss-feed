name: Release

on:
  push:
    tags:
      - 'v[0-9]+'
      - 'v[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        env:
          UUID: rss-feed@gnome-shell-extension.todevelopers.github.com
        run: git archive HEAD --format=zip -o "$UUID.zip"

      - name: Extract release notes from CHANGELOG
        run: |
          awk '
            /^### /{c++; if (c==2) exit}
            c>=1 {lines[n++]=$0}
            END{
              while (n>0 && (lines[n-1]=="" || lines[n-1]=="---")) n--
              for (i=0; i<n; i++) print lines[i]
            }
          ' CHANGELOG.md > RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            rss-feed@gnome-shell-extension.todevelopers.github.com.zip

      - name: Publish release badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 87195eb23e76eae80cd14a6d80e56072
          filename: release.json
          label: release
          message: ${{ github.ref_name }}
          color: blue
          cacheSeconds: 0

      - name: Compute supported GNOME version
        id: gnome
        run: echo "version=$(jq -r '.["shell-version"] | map(tonumber) | max' metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Publish GNOME badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 87195eb23e76eae80cd14a6d80e56072
          filename: gnome.json
          label: GNOME
          message: ${{ steps.gnome.outputs.version }}
          color: 4A86CF
          namedLogo: gnome
          logoColor: white
          cacheSeconds: 0
